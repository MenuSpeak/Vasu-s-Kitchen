<head>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap"

    <style>
        
        /* Tabs Navigation - Category Buttons */
        .tabs-container {
            position: relative;
            margin-bottom: 10px;
        }

        .tabs-scroll {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0;
            justify-content: center;
        }

        .tab {
            padding: 10px 16px;
            border-radius: 999px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
            color: var(--muted);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.3s ease;
            margin: 2px;
        }

        .tabs-container {
            text-align: center;
        }

        .tab-row {
            margin-bottom: 10px;
        }

        .tab {
            margin: 4px;
        }
        
        .tab.active {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            color: #0b0b0d;
            border: none;
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.12);
        }

        /* Hover effect for better UX */
        .tab:hover {
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        /* Veg/Non-Veg Filter Buttons */
        .diet-filter {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .diet-btn {
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            letter-spacing: 1px;
        }

        .diet-btn .symbol-badge {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-block;
        }

        .diet-btn.veg-btn .symbol-badge {
            background: #4caf50;
            box-shadow: 0 0 6px #4caf50;
        }

        .diet-btn.nonveg-btn .symbol-badge {
            background: #f44336;
            box-shadow: 0 0 6px #f44336;
        }

        .diet-btn.active {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            color: #0b0b0d;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2);
        }

        .diet-btn.veg-btn.active .symbol-badge {
            background: #1b5e20;
            box-shadow: none;
        }

        .diet-btn.nonveg-btn.active .symbol-badge {
            background: #b71c1c;
            box-shadow: none;
        }

        .diet-btn:hover {
            transform: translateY(-2px);
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold2);
        }

        /* Tablet styles */
        @media (min-width: 768px) {
            .tabs-scroll {
                justify-content: flex-start;
            }
            .tab {
                padding: 12px 20px;
                font-size: 15px;
            }
            .diet-btn {
                padding: 12px 32px;
                font-size: 18px;
            }
        }

        /* Desktop styles */
        @media (min-width: 1024px) {
            .tab {
                padding: 12px 24px;
                font-size: 15px;
            }
        }

        /* Mobile-specific adjustments */
        @media (max-width: 767px) {
            .tab {
                padding: 8px 14px;
                font-size: 13px;
            }
            .tabs-scroll {
                justify-content: center;
            }
            .diet-btn {
                padding: 8px 20px;
                font-size: 14px;
            }
        }

        /* Small mobile devices */
        @media (max-width: 480px) {
            .tab {
                padding: 6px 12px;
                font-size: 12px;
            }
            .tabs-scroll {
                gap: 5px;
            }
            .diet-filter {
                gap: 12px;
            }
            .diet-btn {
                padding: 6px 16px;
                font-size: 13px;
            }
        }

        :root {
            --bg: #0b0b0d;
            --surface: #0f1114;
            --muted: #9aa0a6;
            --gold1: #d4af37;
            --gold2: #ffcc66;
            --accent: linear-gradient(90deg, var(--gold1), var(--gold2));
            --glass: rgba(255, 255, 255, 0.03);
            --card-radius: 16px;
            --shadow: 0 10px 30px rgba(2, 6, 23, 0.6);
            --glass-strong: rgba(255, 255, 255, 0.04);
            --maxw: 1200px;
            --gap: 20px;
            --ff-heading: 'Playfair Display', serif;
            --ff-ui: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            --orange: #ff9800;
            --green: #4CAF50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            font-size: 16px;
        }

        body {
            position: relative;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background image layer */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.png') no-repeat center center/cover;
            filter: grayscale(100%);
            opacity: 0.5;
            z-index: -1;
        }

        body {
            background: radial-gradient(1200px 600px at 10% 10%, rgba(212, 175, 55, 0.06), transparent 6%),
                        radial-gradient(1000px 500px at 95% 90%, rgba(255, 204, 102, 0.04), transparent 8%),
                        var(--bg);
            color: #e8e6e3;
            font-family: var(--ff-ui);
            -webkit-font-smoothing: antialiased;
            padding: 16px;
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: var(--maxw);
            display: flex;
            flex-direction: column;
            gap: var(--gap);
        }
  
        /* Cafe Header - Original Style */
        .cafe-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .cafe-name {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--gold1);
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
            line-height: 1;
            margin-bottom: 5px;
            position: relative;
            display: inline-block;
        }

        .cafe-name::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 2px;
            background: var(--gold1);
        }

        .cafe-subtitle {
            font-size: 1.2rem;
            color: var(--orange);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 10px;
        }

        .location-info {
            font-size: 1rem;
            margin-top: 15px;
            line-height: 1.6;
        }

        .location-text {
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .address {
            color: var(--green);
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 8px;
        }

        .mobile-numbers {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 15px;
        }

        .veg-nonveg {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .veg, .nonveg {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .veg { color: #2e7d32; background: rgba(46, 125, 50, 0.1); }
        .nonveg { color: #c62828; background: rgba(198, 40, 40, 0.1); }

        .symbol {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
        }
        .veg .symbol { background: #4caf50; border: 2px solid #2e7d32; }
        .nonveg .symbol { background: #f44336; border: 2px solid #c62828; }

        /* Location Link Section */
        .location-link-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            text-align: center;
        }

        .map-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            color: #0b0b0d;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .map-link:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3); }

        /* Search & Controls */
        .search-container {
            background: var(--glass);
            backdrop-filter: blur(6px);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
        }
        .search-container input {
            background: transparent;
            border: 0;
            outline: 0;
            color: inherit;
            font-size: 16px;
            width: 100%;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0.01));
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.6);
            transition: transform 0.28s cubic-bezier(0.2, 0.9, 0.2, 1);
        }
        .card:hover { transform: translateY(-5px); }

        .thumb {
            width: 180px;
            height: 180px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .card:hover .thumb img { transform: scale(1.06); }

        .card-info { flex: 1; }
        .dish { font-size: 16px; font-weight: 600; font-family: var(--ff-heading); }
        .desc { color: var(--muted); font-size: 13px; margin-top: 4px; }
        .price { font-weight: 700; font-size: 16px; color: var(--gold2); }
        .pill { padding: 4px 8px; border-radius: 999px; border: 1px solid rgba(255, 255, 255, 0.03); font-size: 11px; }

        .btn-primary {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: #0b0b0d;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.25); }

        /* Cart Styles */
        .cart-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
        .cart-button {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border: none;
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 11, 13, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 16px;
        }
        .cart-modal.open { opacity: 1; visibility: visible; }
        .cart-content {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            border-radius: var(--card-radius);
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .btn-whatsapp { background: #25D366; border: none; padding: 14px; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .delivery-options { margin: 20px 0; padding: 20px; background: rgba(255, 255, 255, 0.015); border-radius: 10px; }
        .option-btn { flex: 1; padding: 12px; border-radius: 8px; background: transparent; border: 2px solid rgba(255, 255, 255, 0.08); color: var(--muted); cursor: pointer; }
        .option-btn.active { background: linear-gradient(90deg, rgba(212, 175, 55, 0.1), rgba(255, 204, 102, 0.1)); border-color: var(--gold1); color: var(--gold2); }

        @media (min-width: 768px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1024px) {
            .menu-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>

        let cart = [];
        let currentDietFilter = "veg";   // 'veg' or 'nonveg'
        let currentCategory = "all";
        let searchQuery = "";

        // Helper: filter items based on diet + category + search
        function getFilteredItems() {
            let items = data.filter(item => item.diet === currentDietFilter);
            if (currentCategory !== "all") {
                items = items.filter(item => item.cat === currentCategory);
            }
            if (searchQuery.trim() !== "") {
                const q = searchQuery.toLowerCase();
                items = items.filter(item => item.name.toLowerCase().includes(q) || (item.desc && item.desc.toLowerCase().includes(q)));
            }
            return items;
        }

        function renderMenu() {
            const items = getFilteredItems();
            const menuGrid = document.getElementById('menuGrid');
            if (!items.length) {
                menuGrid.innerHTML = '<p style="text-align:center;color:var(--muted);grid-column:1/-1;padding:40px">No items found</p>';
                return;
            }
            menuGrid.innerHTML = items.map(item => `
                <div class="card">
                    <div class="card-header">
                        <div class="thumb"><img src="${item.img}" alt="${item.name}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgdmlld0JveD0iMCAwIDE4MCAxODAiIGZpbGw9Im5vbmUiPjxyZWN0IHdpZHRoPSIxODAiIGhlaWdodD0iMTgwIiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMDMpIi8+PC9zdmc+'"></div>
                        <div class="card-info">
                            <h3 class="dish">${item.name}</h3>
                            <p class="desc">${item.desc || 'Delicious item'}</p>
                            <div class="tags">${item.tags?.map(t=>`<span class="pill">${t}</span>`).join('') || ''}</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="price">${item.price}</div>
                        <button class="btn-primary" onclick='addToCart(${JSON.stringify(item).replace(/'/g, "&#39;")}, this)'>Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        // Cart logic
        function addToCart(item, button) {
            const existing = cart.find(i => i.id === item.id);
            if (existing) existing.quantity++;
            else cart.push({ id: item.id, name: item.name, price: item.price, quantity: 1 });
            updateCartUI();
            button.classList.add('adding'); button.innerHTML = 'Adding...';
            setTimeout(() => { button.classList.remove('adding'); button.innerHTML = '✓ Added'; setTimeout(() => button.innerHTML = 'Add to Cart', 800); }, 400);
        }
        function removeFromCart(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }
        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) { item.quantity += delta; if (item.quantity <= 0) removeFromCart(id); else updateCartUI(); }
        }
        function updateCartUI() {
            const count = cart.reduce((s,i)=>s+i.quantity,0);
            document.getElementById('cartCount').innerText = count;
            const cartItemsDiv = document.getElementById('cartItems');
            const emptyDiv = document.getElementById('cartEmpty');
            if (!cart.length) { emptyDiv.style.display = 'block'; cartItemsDiv.innerHTML = ''; document.getElementById('cartTotal').innerText = '₹0'; return; }
            emptyDiv.style.display = 'none';
            let total = 0;
            let html = '';
            cart.forEach(item => {
                let priceNum = parseInt(item.price.toString().replace(/[^0-9]/g,'')) || 0;
                total += priceNum * item.quantity;
                html += `<div class="cart-item"><div><div>${item.name}</div><div>${item.price}</div></div><div><button onclick="updateQuantity(${item.id}, -1)">-</button><span>${item.quantity}</span><button onclick="updateQuantity(${item.id}, 1)">+</button><button onclick="removeFromCart(${item.id})">🗑</button></div></div>`;
            });
            cartItemsDiv.innerHTML = html;
            document.getElementById('cartTotal').innerText = `₹${total}`;
        }
        window.addToCart = addToCart; window.removeFromCart = removeFromCart; window.updateQuantity = updateQuantity;

        // Delivery & Modal
        let deliveryType = 'restaurant';
        function selectDeliveryOption(type) { deliveryType = type; document.getElementById('restaurantForm').classList.toggle('active',type==='restaurant'); document.getElementById('homeDeliveryForm').classList.toggle('active',type==='home'); document.getElementById('restaurantOption').classList.toggle('active',type==='restaurant'); document.getElementById('homeDeliveryOption').classList.toggle('active',type==='home'); updateSummary(); }
        function updateSummary() { let summaryDiv=document.getElementById('customerDetailsSummary'); if(deliveryType==='restaurant' && document.getElementById('tableNumber').value.trim()) summaryDiv.innerHTML=`<div>🏠 Dine-in | Table: ${document.getElementById('tableNumber').value}</div>`; else if(deliveryType==='home' && (document.getElementById('customerName').value.trim()||document.getElementById('customerMobile').value.trim())) summaryDiv.innerHTML=`<div>🚚 Delivery to: ${document.getElementById('customerName').value} | ${document.getElementById('customerMobile').value}</div>`; else summaryDiv.innerHTML=''; }
        window.selectDeliveryOption = selectDeliveryOption;
        document.getElementById('tableNumber')?.addEventListener('input',updateSummary);
        document.getElementById('customerName')?.addEventListener('input',updateSummary);
        document.getElementById('customerMobile')?.addEventListener('input',updateSummary);
        document.getElementById('cartButton').onclick = () => document.getElementById('cartModal').classList.add('open');
        document.getElementById('closeCart').onclick = () => document.getElementById('cartModal').classList.remove('open');
        document.getElementById('clearCart').onclick = () => { cart = []; updateCartUI(); };
        document.getElementById('whatsappOrder').onclick = () => {
            if(!cart.length) return alert('Cart empty');
            if(deliveryType==='restaurant' && !document.getElementById('tableNumber').value.trim()) return alert('Enter table number');
            if(deliveryType==='home' && (!document.getElementById('customerName').value.trim() || !document.getElementById('customerMobile').value.trim())) return alert('Enter name & mobile');
            let msg = `*VASU'S KITCHEN Order*\n${deliveryType==='restaurant'?`Dine-in | Table: ${document.getElementById('tableNumber').value}`:`Delivery: ${document.getElementById('customerName').value} | ${document.getElementById('customerMobile').value} | ${document.getElementById('customerAddress').value||''}`}\n\nItems:\n`;
            let total=0;
            cart.forEach(i=>{ let p=parseInt(i.price.replace(/[^0-9]/g,''))||0; total+=p*i.quantity; msg+=`• ${i.name} x${i.quantity} = ₹${p*i.quantity}\n`; });
            msg+=`\nTotal: ₹${total}\nThank you!`;
            window.open(`https://wa.me/919970717373?text=${encodeURIComponent(msg)}`,'_blank');
        };
        document.getElementById('addAnotherItem').onclick = () => { document.getElementById('cartModal').classList.remove('open'); document.getElementById('search').focus(); };

        // Filtering logic: VEG / NON-VEG buttons
        const vegBtn = document.getElementById('filterVegBtn');
        const nonVegBtn = document.getElementById('filterNonVegBtn');
        function setDietFilter(diet) {
            currentDietFilter = diet;
            if (diet === 'veg') { vegBtn.classList.add('active'); nonVegBtn.classList.remove('active'); }
            else { nonVegBtn.classList.add('active'); vegBtn.classList.remove('active'); }
            renderMenu();
        }
        vegBtn.addEventListener('click', () => setDietFilter('veg'));
        nonVegBtn.addEventListener('click', () => setDietFilter('nonveg'));
        
        // Category tabs & search
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
                tab.classList.add('active');
                currentCategory = tab.dataset.cat;
                renderMenu();
            });
        });
        document.getElementById('search').addEventListener('input', (e) => { searchQuery = e.target.value; renderMenu(); });
        
        // Initial render with default veg
        renderMenu();
        updateCartUI();
        selectDeliveryOption('restaurant');
    </script>
</body>
</html>
