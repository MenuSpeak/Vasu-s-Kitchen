        :root {

            --green: #4CAF50;

        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(1200px 600px at 10% 10%, rgba(212,175,55,0.06), transparent 6%), var(--bg);

            padding: 16px;
            display: flex;
            justify-content: center;
        }
        .container { max-width: 1200px; width: 100%; margin: 0 auto; }
        
        /* Cafe Header */
        .cafe-header { text-align: center; margin-bottom: 30px; }
        .cafe-name { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 800; color: var(--gold1); }
        .address { color: var(--green); font-weight: 700; }
        .mobile-numbers { color: #fff; font-weight: 700; }
        
        /* MAIN VEG/NON-VEG FILTER BUTTONS */
        .main-diet-filter {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0 30px 0;
        }
        .main-diet-btn {
            padding: 15px 40px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
        }
        .main-diet-btn .diet-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-block;
        }
        .main-diet-btn.veg-main .diet-icon { background: #4caf50; box-shadow: 0 0 10px #4caf50; }
        .main-diet-btn.nonveg-main .diet-icon { background: #f44336; box-shadow: 0 0 10px #f44336; }
        .main-diet-btn.active {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            color: #0b0b0d;
            transform: scale(1.03);
        }
        .main-diet-btn:hover { transform: translateY(-3px); background: rgba(212,175,55,0.2); color: var(--gold2); }
        
        /* Category Tabs - Style common */
        .tabs-scroll {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            min-height: 60px;
        }
        .tab {
            padding: 10px 22px;
            border-radius: 999px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 15px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            color: #0b0b0d;
            border: none;
        }
        .tab:hover {
            border-color: var(--gold1);
            color: var(--gold2);
        }
        
        /* Search */
        .search-container {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(6px);
            padding: 12px 18px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .search-container input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            font-size: 16px;
        }
        
        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.005));
            border-radius: 18px;
            padding: 18px;
            border: 1px solid rgba(255,255,255,0.04);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .thumb { width: 100%; height: 170px; border-radius: 14px; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .dish { font-size: 18px; font-weight: 700; margin: 12px 0 5px; }
        .desc { color: var(--muted); font-size: 13px; line-height: 1.4; }
        .price { font-weight: 800; color: var(--gold2); font-size: 18px; margin: 12px 0; }
        .btn-primary {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 15px;
            transition: transform 0.2s;
        }
        .btn-primary:active { transform: scale(0.97); }
        .veg-badge { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #4caf50; margin-right: 8px; }
        .nonveg-badge { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #f44336; margin-right: 8px; }
        
        /* Cart */
        .cart-container { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        .cart-button {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; border: none;
            box-shadow: 0 5px 20px rgba(212,175,55,0.3);
        }
        .cart-count {
            position: absolute; top: -5px; right: -5px;
            background: #e74c3c; color: white; width: 26px; height: 26px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold;
        }
        .cart-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .cart-modal.open { opacity: 1; visibility: visible; }
        .cart-content {
            background: var(--surface); width: 100%; max-width: 500px;
            border-radius: 20px; padding: 25px; max-height: 80vh; overflow-y: auto;

        .btn-whatsapp { background: #25D366; border: none; padding: 14px; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; }
        .form-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; }

    </style>

        // VEG ke liye category buttons (alag)
        const vegCategories = [
            { key: "all", name: "🍽️ All Veg" },
            { key: "SNACKS", name: "🍟 Snacks" },
            { key: "CHINESE", name: "🍜 Chinese" },
            { key: "THALI", name: "🍱 Thali" },
            { key: "SABJI", name: "🥗 Veg Sabji" },
            { key: "RICE", name: "🍚 Rice & Biryani" }
        ];

        // NON-VEG ke liye category buttons (alag)
        const nonvegCategories = [
            { key: "all", name: "🍽️ All Non Veg" },
            { key: "RICE & BIRYANI", name: "🍚 Rice & Biryani" },
            { key: "CURRY", name: "🥘 Curry" },
            { key: "FRY", name: "🍗 Fry" },
            { key: "TANDOOR", name: "🔥 Tandoor" },
            { key: "THALI", name: "🍱 Thali" },
            { key: "FISH", name: "🐟 Fish" }
        ];

        // State
        let currentDiet = "veg";    // "veg" or "nonveg"
        let currentCategory = "all";
        let searchText = "";
        let cart = [];

        // Get current items based on diet
        function getCurrentItems() {
            return currentDiet === "veg" ? vegItems : nonvegItems;
        }

        // Get current categories based on diet
        function getCurrentCategories() {
            return currentDiet === "veg" ? vegCategories : nonvegCategories;
        }

        // Filter items based on category and search
        function getFilteredItems() {
            let items = getCurrentItems();
            if (currentCategory !== "all") {
                items = items.filter(item => item.cat === currentCategory);
            }
            if (searchText.trim() !== "") {
                const query = searchText.toLowerCase();
                items = items.filter(item => item.name.toLowerCase().includes(query) || 
                                            (item.desc && item.desc.toLowerCase().includes(query)));
            }
            return items;
        }

        // Render category tabs (VEG ke alag / NON VEG ke alag)
        function renderTabs() {
            const categories = getCurrentCategories();
            const container = document.getElementById("tabsContainer");
            container.innerHTML = categories.map(cat => `
                <button class="tab ${currentCategory === cat.key ? 'active' : ''}" data-cat="${cat.key}">
                    ${cat.name}
                </button>
            `).join("");

            // Add event listeners to tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener("click", () => {
                    currentCategory = tab.dataset.cat;
                    renderTabs();
                    renderMenu();
                });
            });
        }

        // Render menu grid
        function renderMenu() {
            const items = getFilteredItems();
            const grid = document.getElementById("menuGrid");
            if (items.length === 0) {
                grid.innerHTML = `<p style="text-align:center; color:var(--muted); grid-column:1/-1; padding:40px;">No ${currentDiet === 'veg' ? 'Veg' : 'Non-Veg'} items found</p>`;
                return;
            }
            grid.innerHTML = items.map(item => `
                <div class="card">
                    <div class="thumb">
                        <img src="${item.img}" alt="${item.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23333%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%23999%22%3E🍽%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div>
                        <span class="${item.diet === 'veg' ? 'veg-badge' : 'nonveg-badge'}"></span>
                        <span class="dish">${item.name}</span>
                    </div>
                    <div class="desc">${item.desc || 'Delicious item'}</div>
                    <div class="price">${item.price}</div>
                    <button class="btn-primary" onclick="addToCart(${item.id})">Add to Cart</button>
                </div>
            `).join("");
        }

        // Add to cart
        function addToCart(id) {
            const items = getCurrentItems();
            const item = items.find(i => i.id === id);
            if (!item) return;
            const existing = cart.find(c => c.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...item, qty: 1 });
            }
            updateCartUI();
            // Animation effect
            const btns = document.querySelectorAll('.btn-primary');
            btns.forEach(btn => {
                if (btn.innerText === "Add to Cart") {
                    btn.style.transform = "scale(0.95)";
                    setTimeout(() => btn.style.transform = "", 150);
                }
            });
        }

        function updateCartUI() {
            const count = cart.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById("cartCount").innerText = count;
            const total = cart.reduce((sum, i) => {
                let price = parseInt(i.price.replace(/[^0-9]/g, '')) || 0;
                return sum + (price * i.qty);
            }, 0);
            document.getElementById("cartTotal").innerText = total;
            
            const cartItemsDiv = document.getElementById("cartItemsList");
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = "<p style='color:var(--muted); text-align:center;'>Cart is empty 🛒</p>";
                return;
            }
            cartItemsDiv.innerHTML = cart.map(item => `
                <div style="display:flex; justify-content:space-between; align-items:center; margin:12px 0; border-bottom:1px solid rgba(255,255,255,0.1); padding:10px 0;">
                    <div style="flex:2;">
                        <strong>${item.name}</strong><br>
                        <small>${item.price}</small>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button onclick="updateQty(${item.id}, -1)" style="background:#333; border:none; color:white; width:32px; height:32px; border-radius:8px; cursor:pointer;">−</button>
                        <span style="min-width:30px; text-align:center;">${item.qty}</span>
                        <button onclick="updateQty(${item.id}, 1)" style="background:#333; border:none; color:white; width:32px; height:32px; border-radius:8px; cursor:pointer;">+</button>
                        <button onclick="removeFromCart(${item.id})" style="background:#e74c3c; border:none; color:white; width:32px; height:32px; border-radius:8px; cursor:pointer;">✕</button>
                    </div>
                </div>
            `).join("");
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                updateCartUI();
            }
        }
        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        window.addToCart = addToCart;
        window.updateQty = updateQty;
        window.removeFromCart = removeFromCart;

        // Diet change function - VEG ya NON VEG select karne par SAB KUCH CHANGE HO JAYEGA
        function setDiet(diet) {
            currentDiet = diet;
            currentCategory = "all";  // Reset to "All" category
            
            // Update main buttons style
            const vegMainBtn = document.getElementById("mainVegBtn");
            const nonVegMainBtn = document.getElementById("mainNonVegBtn");
            if (diet === "veg") {
                vegMainBtn.classList.add("active");
                nonVegMainBtn.classList.remove("active");
            } else {
                nonVegMainBtn.classList.add("active");
                vegMainBtn.classList.remove("active");
            }
            
            // Re-render category tabs (VEG ke alag / NON VEG ke alag buttons)
            renderTabs();
            // Re-render menu
            renderMenu();
            // Search text reset karne ki zaroorat nahi, but clear kar sakte ho
            // document.getElementById("searchInput").value = ""; // optional
            // searchText = "";
        }

        // Event listeners for main VEG/NON VEG buttons
        document.getElementById("mainVegBtn").addEventListener("click", () => setDiet("veg"));
        document.getElementById("mainNonVegBtn").addEventListener("click", () => setDiet("nonveg"));

        // Search
        document.getElementById("searchInput").addEventListener("input", (e) => {
            searchText = e.target.value;
            renderMenu();
        });

        // Cart Modal
        const cartModal = document.getElementById("cartModal");
        document.getElementById("cartBtn").addEventListener("click", () => cartModal.classList.add("open"));
        document.getElementById("closeCartBtn").addEventListener("click", () => cartModal.classList.remove("open"));
        
        // WhatsApp Order
        document.getElementById("whatsappOrderBtn").addEventListener("click", () => {
            if (cart.length === 0) {
                alert("Cart is empty! Please add items.");
                return;
            }
            let message = `*VASU'S KITCHEN ORDER* 🍽️\n\n`;
            message += `*Diet:* ${currentDiet === 'veg' ? '🥬 VEG' : '🍗 NON VEG'}\n\n`;
            message += `*Items:*\n`;
            let total = 0;
            cart.forEach(item => {
                let price = parseInt(item.price.replace(/[^0-9]/g, '')) || 0;
                let itemTotal = price * item.qty;
                total += itemTotal;
                message += `• ${item.name} x ${item.qty} = ₹${itemTotal}\n`;
            });
            message += `\n*Total: ₹${total}*\n\n`;
            message += `📍 Location: bhekrainagar hadapsar pune\n📞 Contact: 9970717373`;
            const encoded = encodeURIComponent(message);
            window.open(`https://wa.me/919970717373?text=${encoded}`, "_blank");
        });

        // Initial Load - VEG by default
        renderTabs();
        renderMenu();
        updateCartUI();
    </script>
